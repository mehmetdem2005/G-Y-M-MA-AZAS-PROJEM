name: CI/CD Pipeline
on: [push, pull_request]

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm compose:config
      - run: pnpm preflight
      - run: pnpm -r lint
      - run: pnpm -r test -- --coverage
      - run: npm audit --production --audit-level=high
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  build-and-deploy:
    needs: test-and-scan
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t api:latest ./apps/api
      - run: docker build -t web:latest ./apps/web
      - run: echo "Deploy to staging via kubectl/helm..."
      - run: curl -f https://staging-api.yourdomain.com/health
